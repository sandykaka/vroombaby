<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Shillak</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #1c1c1e;
            margin: 0;
            padding: 0;
            background-color: #f2f2f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #ffffff;
            max-width: 420px;
            width: 90%;
            margin: 20px;
            padding: 40px 32px;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { color: #1c1c1e; margin: 16px 0 8px; font-size: 28px; }
        p { color: #6c6c70; font-size: 16px; }
        .code-box {
            background: #f0f8f4;
            border: 2px dashed #35BE61;
            border-radius: 12px;
            padding: 20px;
            margin: 24px 0;
            font-family: 'SF Mono', Menlo, monospace;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #2ea854;
        }
        .button {
            display: inline-block;
            background: #35BE61;
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 17px;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .button:hover { background: #2ea854; }
        .icon {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, #35BE61, #2ea854);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 42px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(53, 190, 97, 0.3);
        }
        .steps {
            text-align: left;
            margin-top: 24px;
            padding: 0;
            list-style: none;
        }
        .steps li {
            padding: 12px 0;
            border-bottom: 1px solid #e5e5ea;
            color: #1c1c1e;
            font-size: 15px;
        }
        .steps li:last-child { border-bottom: none; }
        .steps strong { color: #35BE61; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">$</div>
        <h1>Join Shillak</h1>
        <p>You've been invited to share family finances.</p>

        <div class="code-box">{{ invite_code }}</div>

        <a href="https://apps.apple.com/app/id6762668724" class="button">Download Shillak</a>

        <ul class="steps">
            <li><strong>1.</strong> Download Shillak from the App Store</li>
            <li><strong>2.</strong> Sign in with your phone number</li>
            <li><strong>3.</strong> Tap "I Have an Invite" and enter the code above</li>
        </ul>
    </div>
</body>
</html>
